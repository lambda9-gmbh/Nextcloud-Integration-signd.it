name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches info.xml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          XML_VERSION=$(grep -oP '<version>\K[^<]+' appinfo/info.xml)
          if [ "$TAG" != "$XML_VERSION" ]; then
            echo "::error::Tag v$TAG does not match info.xml version $XML_VERSION"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create tarball
        run: |
          mkdir -p build/integration_signd
          # App metadata
          cp -r appinfo build/integration_signd/
          # Backend
          cp -r lib build/integration_signd/
          # Frontend (built)
          cp -r js build/integration_signd/
          # Assets
          cp -r img build/integration_signd/
          # Translations
          cp -r l10n build/integration_signd/
          # License
          cp LICENSE build/integration_signd/
          # Create tarball
          cd build
          tar -czf integration_signd-${VERSION}.tar.gz integration_signd
          echo "TARBALL=build/integration_signd-${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: false